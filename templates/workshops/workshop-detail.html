{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Workshops</h2>

<div class="row">
    {% for workshop in workshops %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                {% if workshop.image %}
                    <img src="{{ workshop.image.url }}" class="card-img-top">
                {% endif %}
                <div class="card-body">
                    <h5>{{ workshop.title }}</h5>
                    <p>{{ workshop.city }}</p>
                    <p><strong>${{ workshop.price }}</strong></p>

                    <a href="{% url 'workshop-detail' workshop.pk %}" class="btn btn-primary">
                        View Details
                    </a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
