{% extends 'base.html' %}

{% block title %}Home | CraftNest{% endblock %}

{% block content %}
<section class="text-center py-5">
    <h1 class="display-4">Discover inspiring creative workshops</h1>
    <p class="lead">Join art, pottery, photography, and many more hands-on workshops.</p>

    {% if not request.user.is_authenticated %}
        <a href="{% url 'register' %}" class="btn btn-primary btn-lg me-2">Register</a>
        <a href="{% url 'login' %}" class="btn btn-outline-secondary btn-lg">Login</a>
    {% endif %}
</section>
{% endblock %}
