{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4 text-danger">Delete Workshop</h2>

<p>Are you sure you want to delete this workshop?</p>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-danger">Delete Workshop</button>
    <a href="{% url 'workshop-detail' object.pk %}" class="btn btn-outline-secondary">Back</a>
</form>
{% endblock %}
