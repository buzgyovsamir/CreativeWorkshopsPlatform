{% extends 'base.html' %}

{% block title %}Profile | CraftNest{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title">{{ profile.username }}</h2>
                <p><strong>Email:</strong> {{ profile.email }}</p>
                <p><strong>City:</strong> {{ profile.city|default:"No information" }}</p>
                <p><strong>Bio:</strong> {{ profile.bio|default:"No information" }}</p>

                <a href="{% url 'profile-edit' profile.pk %}" class="btn btn-warning">Edit Profile</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
